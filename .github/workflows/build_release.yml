name: Build and Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - "src/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cpp:
    name: Build Native DLL
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with: 
          submodules: true
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install SCons
        run: pip install scons
        
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          
      - name: Execute Unified Build (C++)
        shell: pwsh
        run: |
          cd src/trimmer
          .\build.ps1 -Cpp -Mode release
          
      - name: Package Output (ZIP)
        shell: pwsh
        run: |
          $DllPath = "src\trimmer\build\cpp\version.dll"
          if (-not (Test-Path $DllPath)) {
              Write-Error "[-] Build failed silently: $DllPath was not generated!"
              exit 1
          }
          Write-Host "[+] Found generated DLL: $DllPath"
          
          if ("${{ github.ref_type }}" -eq "tag") {
              $ZipName = "ZIRC-Hook-Release-${{ github.ref_name }}.zip"
          } else {
              $ShortSha = "${{ github.sha }}".Substring(0, 7)
              $ZipName = "ZIRC-Hook-Build-$ShortSha.zip"
          }
          
          Compress-Archive -Path $DllPath -DestinationPath $ZipName
          Write-Host "[+] Created archive: $ZipName"
          echo "ZIP_NAME=$ZipName" >> $env:GITHUB_ENV
          
      - name: Upload Artifact to Action Summary
        uses: actions/upload-artifact@v4
        with:
          name: ZIRC-Artifacts
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error
          
  release:
    name: Create GitHub Release
    needs: build-cpp
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ZIRC-Artifacts
          path: release_assets
          
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}

  publish-pypi:
    name: Publish zirc to PyPI
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Build Tools
        run: python -m pip install --upgrade pip build
        
      - name: Build Source and Wheel
        working-directory: ./src/core
        run: python -m build
        
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: src/core/dist/