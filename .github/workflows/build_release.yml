name: Build and Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - "src/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cpp:
    name: Build Native DLL
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install SCons
        run: pip install scons
        
      # Use official action to set up MSVC environment variables implicitly
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          
      - name: Execute Unified Build (C++)
        shell: pwsh
        run: |
          cd src
          # SCons will be available, MSVC is configured, CI runs Fallback offset generation.
          .\build.ps1 -Cpp -Mode release
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZIRC-Native-Build
          path: src/build/cpp/version.dll
          
  release:
    name: Create GitHub Release
    needs: build-cpp
    # Only run on tags (e.g., v1.0.0)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ZIRC-Native-Build
          path: release_assets
          
      - name: Create Zip Archive
        run: |
          cd release_assets
          zip -r ZIRC-Hook-Release-${{ github.ref_name }}.zip version.dll
          
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}