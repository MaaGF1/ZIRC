name: GFL Auto Farm Workflow

on:
  workflow_dispatch:
    inputs:
      mission_type:
        description: 'Select Mission Type to Farm'
        required: true
        default: 'f2p'
        type: choice
        options:
          - f2p
          - pick_coin

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine Matrix Length
        id: set-matrix
        env:
          GFL_CONFIG_RAW: ${{ secrets.GFL_CONFIG }}
        run: |
          # Use python to safely calculate the array (e.g. ["0", "1"])
          MATRIX_JSON=$(python -c '
          import os, json
          
          config_raw = os.environ.get("GFL_CONFIG_RAW", "").strip()
          
          # Default to 1 instance
          length = 1
          
          if config_raw:
              try:
                  configs = json.loads(config_raw)
                  # Ensure it is a valid list with elements, else fallback to length=1
                  if isinstance(configs, list) and len(configs) > 0:
                      length = len(configs)
              except Exception:
                  pass
                  
          # Output string array without any spaces: ["0","1"]
          print(json.dumps([str(i) for i in range(length)], separators=(",",":")))
          ')
          
          echo "Generated Index Matrix: $MATRIX_JSON"
          
          # Write safely using EOF delimiter to completely bypass GHA character parsing issues
          EOF_DELIM="EOF_MATRIX_MARKER"
          echo "matrix<<$EOF_DELIM" >> "$GITHUB_OUTPUT"
          echo "$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "$EOF_DELIM" >> "$GITHUB_OUTPUT"

  farm:
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.prepare.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./src/core

      - name: Run GFL Agent
        env:
          # Directly passing Secrets to circumvent GHA Output limits
          GFL_CONFIG: ${{ secrets.GFL_CONFIG }}
          GFL_SIGN_KEY: ${{ secrets.GFL_SIGN_KEY }}
          GFL_MISSION_TYPE: ${{ github.event.inputs.mission_type }}
          GFL_ACCOUNT_INDEX: ${{ matrix.account_index }}
          PYTHONUNBUFFERED: "1"
        run: |
          python src/gha/agent.py

      - name: Check for Respawn Flag
        id: check_respawn
        shell: pwsh
        run: |
          if (Test-Path "respawn.flag") {
            echo "1" > "respawn_${{ matrix.account_index }}.flag"
            Write-Host "Respawn flag detected for account ${{ matrix.account_index }}."
          }

      - name: Upload Respawn Flag
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: respawn-flag-${{ matrix.account_index }}
          path: respawn_${{ matrix.account_index }}.flag
          if-no-files-found: ignore

  trigger_next:
    needs: farm
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all respawn flags
        uses: actions/download-artifact@v4
        with:
          pattern: respawn-flag-*
          merge-multiple: true

      - name: Trigger Next Workflow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if ls respawn_*.flag 1> /dev/null 2>&1; then
            echo "Respawn flag(s) found. Triggering next job..."
            gh workflow run "GFL Auto Farm Workflow" -f mission_type="${{ github.event.inputs.mission_type }}"
            echo "Next job triggered successfully."
          else
            echo "No respawn flags found. All jobs completed or failed fatally."
          fi