name: GFL Auto Farm Workflow

on:
  workflow_dispatch:
    inputs:
      mission_type:
        description: 'Select Mission Type to Farm'
        required: true
        default: 'f2p'
        type: choice
        options:
          - f2p
          - pick_coin

jobs:
  farm:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gflzirc

      - name: Setup Cloudflare WARP to Bypass WAF
        run: |
          echo "Installing Cloudflare WARP..."
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
          echo "Registering and Connecting WARP..."
          warp-cli --accept-tos registration new
          warp-cli --accept-tos connect
          
          echo "Waiting for WARP tunnel to stabilize..."
          sleep 5
          
          echo "Current Public IP:"
          curl -s ifconfig.me
          echo ""

      - name: Run GFL Agent
        env:
          GFL_CONFIG: ${{ secrets.GFL_CONFIG }}
          GFL_SIGN_KEY: ${{ secrets.GFL_SIGN_KEY }}
          GFL_MISSION_TYPE: ${{ github.event.inputs.mission_type }}
        run: |
          python src/gha/agent.py

      - name: Check for Respawn Flag
        id: check_respawn
        run: |
          if [ -f "respawn.flag" ]; then
            echo "RESPAWN_NEEDED=true" >> $GITHUB_ENV
            echo "Respawn flag detected. Triggering next job..."
          else
            echo "RESPAWN_NEEDED=false" >> $GITHUB_ENV
            echo "No respawn flag. Job completed or failed fatally."
          fi

      - name: Trigger Next Workflow
        if: env.RESPAWN_NEEDED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run "GFL Auto Farm Workflow" -f mission_type=${{ github.event.inputs.mission_type }}
          echo "Next job triggered successfully."